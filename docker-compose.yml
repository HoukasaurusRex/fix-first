services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: fixfirst
      POSTGRES_PASSWORD: fixfirst
      POSTGRES_DB: fixfirst
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixfirst"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
