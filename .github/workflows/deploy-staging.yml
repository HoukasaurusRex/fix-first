name: Deploy — Staging

on:
  push:
    branches: [main]

permissions:
  id-token: write   # Required for OIDC
  contents: read

env:
  AWS_REGION: ca-central-1
  DEPLOY_ENV: staging

jobs:
  deploy:
    name: Build, migrate, and deploy to staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "api_image=${ECR_REGISTRY}/fixfirst-api-staging:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "api_image_latest=${ECR_REGISTRY}/fixfirst-api-staging:latest" >> "$GITHUB_OUTPUT"
          echo "web_image=${ECR_REGISTRY}/fixfirst-web-staging:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "web_image_latest=${ECR_REGISTRY}/fixfirst-web-staging:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        run: |
          docker build -t "${{ steps.tags.outputs.api_image }}" -t "${{ steps.tags.outputs.api_image_latest }}" -f apps/api/Dockerfile .
          docker push "${{ steps.tags.outputs.api_image }}"
          docker push "${{ steps.tags.outputs.api_image_latest }}"

      - name: Build and push Web image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://staging-api.fixfirst.ca/api/v1 \
            -t "${{ steps.tags.outputs.web_image }}" \
            -t "${{ steps.tags.outputs.web_image_latest }}" \
            -f apps/web/Dockerfile .
          docker push "${{ steps.tags.outputs.web_image }}"
          docker push "${{ steps.tags.outputs.web_image_latest }}"

      - name: Run Prisma migrations (one-off ECS task)
        run: |
          CLUSTER="FixFirst-Api-staging"
          TASK_DEF="${{ secrets.MIGRATE_TASK_DEF_ARN_STAGING }}"
          SUBNET="${{ secrets.PRIVATE_SUBNET_ID_STAGING }}"
          SG="${{ secrets.API_SG_ID_STAGING }}"

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"ApiContainer","command":["node","dist/db/migrate.js"]}]}' \
            --query 'tasks[0].taskArn' --output text)

          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)

          echo "Migration exit code: $EXIT_CODE"
          test "$EXIT_CODE" -eq 0

      - name: Deploy CDK stacks (staging)
        run: |
          yarn workspace @fixfirst/infra build
          npx cdk deploy --context env=staging --all --require-approval never
        env:
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Output deployed API URL
        run: |
          echo "### Staging Deploy Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- API: https://staging-api.fixfirst.ca/api/v1/health" >> "$GITHUB_STEP_SUMMARY"
          echo "- Web: https://staging.fixfirst.ca" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
