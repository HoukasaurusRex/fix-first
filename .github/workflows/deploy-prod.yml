name: Deploy — Production

on:
  push:
    tags:
      - deploy

permissions:
  id-token: write # Required for OIDC
  contents: read
  issues: write # Required for manual-approval action to create/close approval issue

env:
  AWS_REGION: ca-central-1
  DEPLOY_ENV: production

jobs:
  test:
    name: Lint, build, and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: fixfirst
          POSTGRES_PASSWORD: fixfirst
          POSTGRES_DB: fixfirst
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fixfirst"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://fixfirst:fixfirst@localhost:5432/fixfirst

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Format check
        run: yarn format:check

      - name: Build
        run: yarn build

      - name: Generate Prisma client
        run: yarn workspace @fixfirst/api db:generate

      - name: Test
        run: yarn test

  approve:
    name: Manual approval gate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: HoukasaurusRex
          minimum-approvals: 1
          issue-title: 'Deploy to production: ${{ github.sha }}'
          issue-body: |
            Tests passed. Approve this issue to deploy commit `${{ github.sha }}` to production.
            Comment **approved** to proceed or **denied** to cancel.

  deploy:
    name: Build, migrate, and deploy to production
    runs-on: ubuntu-latest
    needs: approve

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          TAG="${GITHUB_SHA::7}"
          echo "api_image=${ECR_REGISTRY}/fixfirst-api-production:${TAG}" >> "$GITHUB_OUTPUT"
          echo "api_image_latest=${ECR_REGISTRY}/fixfirst-api-production:latest" >> "$GITHUB_OUTPUT"
          echo "web_image=${ECR_REGISTRY}/fixfirst-web-production:${TAG}" >> "$GITHUB_OUTPUT"
          echo "web_image_latest=${ECR_REGISTRY}/fixfirst-web-production:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        run: |
          docker build -t "${{ steps.tags.outputs.api_image }}" -t "${{ steps.tags.outputs.api_image_latest }}" -f apps/api/Dockerfile .
          docker push "${{ steps.tags.outputs.api_image }}"
          docker push "${{ steps.tags.outputs.api_image_latest }}"

      - name: Build and push Web image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://api.fixfirst.ca/api/v1 \
            -t "${{ steps.tags.outputs.web_image }}" \
            -t "${{ steps.tags.outputs.web_image_latest }}" \
            -f apps/web/Dockerfile .
          docker push "${{ steps.tags.outputs.web_image }}"
          docker push "${{ steps.tags.outputs.web_image_latest }}"

      - name: Run Prisma migrations (one-off ECS task)
        run: |
          CLUSTER="FixFirst-Api-production"
          TASK_DEF="${{ secrets.MIGRATE_TASK_DEF_ARN_PROD }}"
          SUBNET="${{ secrets.PRIVATE_SUBNET_ID_PROD }}"
          SG="${{ secrets.API_SG_ID_PROD }}"

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"ApiContainer","command":["node","dist/db/migrate.js"]}]}' \
            --query 'tasks[0].taskArn' --output text)

          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)

          echo "Migration exit code: $EXIT_CODE"
          # Non-zero exit code stops the workflow — ECS service is not updated.
          test "$EXIT_CODE" -eq 0

      - name: Deploy CDK stacks (production)
        run: |
          yarn workspace @fixfirst/infra build
          npx cdk deploy \
            --context env=production \
            --context certificateArn=${{ secrets.ACM_CERT_ARN_PROD }} \
            --all \
            --require-approval never
        env:
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Output deployed URLs
        run: |
          echo "### Production Deploy Complete — ${GITHUB_SHA::7}" >> "$GITHUB_STEP_SUMMARY"
          echo "- API: https://api.fixfirst.ca/api/v1/health" >> "$GITHUB_STEP_SUMMARY"
          echo "- Web: https://fixfirst.ca" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
