name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: fixfirst
          POSTGRES_PASSWORD: fixfirst
          POSTGRES_DB: fixfirst
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fixfirst"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://fixfirst:fixfirst@localhost:5432/fixfirst

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Format check
        run: yarn format:check

      - name: Build
        run: yarn build

      - name: Generate Prisma client
        run: yarn workspace @fixfirst/api db:generate

      - name: Test
        run: yarn test
